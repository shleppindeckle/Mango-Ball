<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mango Ball 2026</title>

  <style>
    :root {
      --mango: #ffb32c;
      --orange: #ff7a2f;
      --leaf: #0b4b3f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 40%),
        linear-gradient(180deg, #fff7c8 0%, #ffd76c 100%);
      color: var(--leaf);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      filter: blur(12px);
      z-index: -1;
      pointer-events: none;
    }

    body::before {
      top: -80px;
      left: -60px;
      background: rgba(255, 179, 44, 0.18);
    }

    body::after {
      bottom: -100px;
      right: -60px;
      background: rgba(11, 75, 63, 0.12);
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 24px 18px 36px;
      text-align: center;
    }

    .top {
      margin-bottom: 28px;
      padding: 20px 12px 4px;
    }

    .eyebrow {
      display: inline-block;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.65);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(255, 179, 44, 0.16);
    }

    h1 {
      margin: 18px 0 20px;
      font-size: clamp(3.3rem, 12vw, 7rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ff9a1f 0%, #ff6d2d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 4px 0 rgba(255,255,255,0.45),
        0 12px 30px rgba(255, 122, 47, 0.18);
      transform: rotate(-1deg);
    }

    .button {
      display: inline-block;
      padding: 16px 30px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--leaf), #106b59);
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 14px 30px rgba(11, 75, 63, 0.2);
      border: 2px solid rgba(255,255,255,0.25);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(11, 75, 63, 0.28);
    }

    .flyer-wrap {
      margin-top: 34px;
      position: relative;
    }

    .flyer-wrap::before {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.08));
      z-index: -1;
    }

    .flyer {
      width: 100%;
      display: block;
      border-radius: 26px;
      box-shadow: 0 28px 70px rgba(11, 75, 63, 0.28);
      border: 6px solid rgba(255,255,255,0.55);
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px 8px 24px;
      }

      .top {
        padding: 8px 8px 0;
        margin-bottom: 18px;
      }

      .eyebrow {
        font-size: 0.72rem;
        padding: 8px 13px;
      }

      h1 {
        margin: 14px auto 18px;
        font-size: clamp(2.7rem, 14.5vw, 4.6rem);
        letter-spacing: -0.075em;
        line-height: 0.92;
        max-width: 95vw;
      }

      .button {
        width: min(100%, 360px);
        padding: 15px 20px;
        font-size: 0.95rem;
      }

      .flyer-wrap {
        margin-top: 26px;
      }

      .flyer-wrap::before {
        inset: -7px;
        border-radius: 22px;
      }

      .flyer {
        border-radius: 16px;
        border-width: 4px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="top">
  
      <h1>Mango Ball ’26</h1>

      <a class="button" href="https://www.zeffy.com/en-US/ticketing/mango-ball-2026-fundraiser-art-raffle">
        Enter the Fundraiser Art Raffle
      </a>
    </section>

    <section class="flyer-wrap">
      <img class="flyer" src="Mango_Ball2026.JPG" alt="Mango Ball 2026 flyer" />
    </section>
  </main>
</body>
</html>
