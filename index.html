<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mango Ball 2026</title>

  <style>
    :root {
      --sun: #fff2a6;
      --mango: #ffb32c;
      --orange: #ff7a2f;
      --leaf: #0b4b3f;
      --cream: #fff9d9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 40%),
        linear-gradient(180deg, #fff7c8 0%, #ffd76c 100%);
      color: var(--leaf);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255, 179, 44, 0.18);
      filter: blur(12px);
      z-index: -1;
    }

    body::before {
      top: -80px;
      left: -60px;
    }

    body::after {
      bottom: -100px;
      right: -60px;
      background: rgba(11, 75, 63, 0.12);
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 24px 18px 40px;
      text-align: center;
    }

    .top {
      position: relative;
      margin-bottom: 30px;
      padding: 24px 20px 10px;
    }

    .top::before,
    .top::after {
      content: "✦";
      position: absolute;
      top: 12px;
      font-size: 2rem;
      color: rgba(255, 122, 47, 0.45);
    }

    .top::before {
      left: 8%;
      transform: rotate(-14deg);
    }

    .top::after {
      right: 8%;
      transform: rotate(12deg);
    }

    .eyebrow {
      display: inline-block;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.65);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(255, 179, 44, 0.16);
    }

    h1 {
      margin: 18px 0 10px;
      padding-right: 42px;
      font-size: clamp(3.8rem, 12vw, 7rem);
      line-height: 0.88;
      letter-spacing: -0.09em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ff9a1f 0%, #ff6d2d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 4px 0 rgba(255,255,255,0.45),
        0 12px 30px rgba(255, 122, 47, 0.18);
      transform: rotate(-1deg);
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: "🥭";
      position: absolute;
      right: -40px;
      top: -12px;
      font-size: 0.32em;
      transform: rotate(14deg);
      -webkit-text-fill-color: initial;
      pointer-events: none;
    }

    .subtitle {
      margin: 0 auto 24px;
      max-width: 560px;
      font-size: 1.2rem;
      font-weight: 600;
      color: rgba(11, 75, 63, 0.88);
    }

    .button {
      display: inline-block;
      padding: 16px 30px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--leaf), #106b59);
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.01em;
      box-shadow: 0 14px 30px rgba(11, 75, 63, 0.2);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .button:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 18px 36px rgba(11, 75, 63, 0.28);
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .flyer-wrap {
      margin-top: 38px;
      position: relative;
    }

    .flyer-wrap::before {
      content: "";
      position: absolute;
      inset: -14px;
      border-radius: 38px;
      background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.08));
      z-index: -1;
    }

    .flyer {
      width: 100%;
      display: block;
      border-radius: 26px;
      box-shadow: 0 28px 70px rgba(11, 75, 63, 0.28);
      border: 6px solid rgba(255,255,255,0.55);
    }

    footer {
      margin-top: 22px;
      font-weight: 700;
      opacity: 0.82;
      letter-spacing: 0.03em;
    }

    @media (max-width: 700px) {
      .page {
        padding: 16px 10px 28px;
      }

      .top {
        padding-top: 10px;
      }

      .top::before,
      .top::after {
        display: none;
      }

      h1 {
        font-size: clamp(3rem, 16vw, 5rem);
      }

      h1::after {
        right: -18px;
        top: -6px;
      }

      .subtitle {
        font-size: 1rem;
      }

      .flyer {
        border-radius: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="leaf one"></div>
  <div class="leaf two"></div>
  <div class="leaf three"></div>

  <main class="page">
    <section class="top">
      <div class="eyebrow">5th Annual · June 20th</div>
      <h1>Mango Ball ’26</h1>
      <p class="subtitle">
        
      </p>

      <a class="button" href="https://www.zeffy.com/en-US/ticketing/mango-ball-2026-fundraiser-art-raffle">
        Enter the Fundraiser Art Raffle
      </a>
    </section>

    <section class="flyer-wrap">
      <img class="flyer" src="Mango_Ball2026.JPG" alt="Mango Ball 2026 flyer" />
    </section>

    <footer>
      🥭 Tropical attire encouraged 🥭
    </footer>
  </main>
</body>
</html>
